name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: uv sync

      - name: Format
        run: uv run ruff check --select I,F401 --fix && uv run ruff format

      - name: Lint
        run: uv run pyrefly check

      - name: Test
        run: uv run pytest -v
